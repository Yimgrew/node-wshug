<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄鹤楼 - 崔颢</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #f5efe0;
            background-image: url('https://images.unsplash.com/photo-1535572979543-960a8046f5af');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "KaiTi", "STKaiti", serif;
        }
        .poem-card {
            width: 90%;
            max-width: 600px;
            background: rgba(255,255,255,0.85);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .title {
            font-size: 36px;
            color: #8b2323;
            margin-bottom: 12px;
        }
        .author {
            font-size: 20px;
            color: #666;
            margin-bottom: 35px;
        }
        .poem-content {
            font-size: 26px;
            line-height: 2.4;
            color: #222;
        }
        .line {
            margin: 8px 0;
        }
        .footer-text {
            margin-top: 40px;
            font-size: 16px;
            color: #777;
        }
        @media (max-width: 500px) {
            .poem-card {
                padding: 35px 20px;
            }
            .title {
                font-size: 28px;
            }
            .poem-content {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="poem-card">
        <h1 class="title">黄鹤楼</h1>
        <div class="author">唐 · 崔颢</div>

        <div class="poem-content">
            <div class="line">昔人已乘黄鹤去，</div>
            <div class="line">此地空余黄鹤楼。</div>
            <div class="line">黄鹤一去不复返，</div>
            <div class="line">白云千载空悠悠。</div>
            <br>
            <div class="line">晴川历历汉阳树，</div>
            <div class="line">芳草萋萋鹦鹉洲。</div>
            <div class="line">日暮乡关何处是？</div>
            <div class="line">烟波江上使人愁。</div>
        </div>

        <div class="footer-text">
            <i class="fa-solid fa-scroll"></i> 千古七律第一
        </div>
    </div>
</body>
</html>
